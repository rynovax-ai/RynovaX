<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>RynovaX AI</title>

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<!-- Sidebar -->

<aside id="sidebar" class="sidebar">

<div class="sidebar-header">

<h2>🤖 RynovaX AI</h2>

</div>

<button id="newChatBtn">
💬 New Chat
</button>

<button id="historyBtn">
🕒 History
</button>

<button id="clearBtn">
🗑 Clear Chat
</button>

<button id="themeBtn">
🌙 Dark Mode
</button>

<div class="history-title">

Recent Chats

</div>

<div id="historyList">

</div>

</aside>

<!-- Main -->

<div class="app">

<header class="topbar">

<button id="menuBtn"
class="icon-btn">

☰

</button>

<div class="logo">

🤖 RynovaX AI

</div>

<button id="settingBtn"
class="icon-btn">

⚙️

</button>

</header>

<main id="chatBox"
class="chat-area">

<div class="message ai">

<div class="avatar">

🤖

</div>

<div class="bubble">

<h3>Welcome 👋</h3>

<p>

Hi!

I'm <b>RynovaX AI</b>.

How can I help you today?

</p>

<span class="time">

Now

</span>

</div>

</div>

</main>

<footer class="input-area">

<input

id="userInput"

type="text"

placeholder="Message RynovaX AI..."

autocomplete="off"

>

<button id="sendBtn">

➤

</button>

</footer>

</div>

<script src="assets/js/script.js"></script>

</body>

</html>
