<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RynovaX AI</title>

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<!-- ================= Header ================= -->

<header class="topbar">

<button id="menuBtn">☰</button>

<div class="logo">

🤖 <span>RynovaX AI</span>

</div>

<button id="settingBtn">⚙️</button>

</header>

<!-- ================= Sidebar ================= -->

<div id="sidebar" class="sidebar">

<h2>🤖 RynovaX AI</h2>

<button id="newChatBtn">
💬 New Chat
</button>

<button id="historyBtn">
🕒 History
</button>

<button id="clearBtn">
🗑 Clear Chat
</button>

<button id="themeBtn">
🌙 Dark Mode
</button>

<hr>

<div id="historyList"></div>

</div>

<!-- ================= Chat ================= -->

<main>

<div
class="chat-container"
id="chatBox">

<div class="message ai">

<div class="avatar ai-avatar">

🤖

</div>

<div class="bubble">

<b>RynovaX AI</b>

<br><br>

Hello 👋

I am RynovaX AI.

How can I help you today?

<div class="time">

Now

</div>

</div>

</div>

</div>

<!-- ================= Input ================= -->

<div class="input-area">

<input

id="userInput"

type="text"

placeholder="Message RynovaX AI..."

autocomplete="off"

>

<button id="sendBtn">

➤

</button>

</div>

</main>

<script src="assets/js/script.js"></script>

</body>

</html>
